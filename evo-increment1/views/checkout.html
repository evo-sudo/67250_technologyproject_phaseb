<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Checkout</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="views/explore.html">Explore</a>
        <a href="views/exhibitions.html">Exhibitions</a>
        <a href="views/tickets.html">Buy Tickets</a>
        <a href="views/checkout.html">Checkout</a>
    </nav>
    <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>
    <label for="ticket">Ticket Type:</label>
    <select id="ticket" name="ticket">
        <option value="adult">Adult - $10</option>
        <option value="children">Children - $8</option>
        <option value="elderly">Elderly - $8</option>
        <option value="student">Student - $5</option>
    </select><br><br>
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" min="1" value="1"><br><br>

    <input type="submit" value="Checkout">
    </form>

</body>
</html>
